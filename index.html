<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Revenue Intelligence Dashboard - Real-time financial analytics with AI-powered insights" />
    <title>Revenue Intelligence Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-surface-950 text-white">
    <div id="root"></div>
    <div id="error-overlay" style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;display:none;font-family:monospace;white-space:pre-wrap;width:100%;height:100vh;overflow:auto;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-overlay').innerText += 'Error: ' + msg + '\n' + (error && error.stack ? error.stack : '') + '\n\n';
        return false;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('error-overlay').style.display = 'block';
        document.getElementById('error-overlay').innerText += 'Promise Rejection: ' + event.reason + '\n' + (event.reason && event.reason.stack ? event.reason.stack : '') + '\n\n';
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
